<style>

  --bg3: #dde5f5;

  --muted: #5a6a8a;
  --border: rgba(26,35,64,0.1);

  --card-hover: #f5f8ff;
  --done-opacity: 0.35;
  --radius: 10px;
  --radius-sm: 6px;
  --timed-accent: #f0a500;
  --cancelled-color: #d63030;
  --green: #16a34a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}


/* LOCATION BAR */
#location-bar {
  position: sticky;
  top: 0;
  z-index: 101;
  background: var(--amber);
  padding: 10px 16px;
  text-align: center;
}
#location-bar a {
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  letter-spacing: 0.3px;
  font-family: 'Inter', sans-serif;
}

/* HEADER */
#header {
  position: sticky;
  top: 40px;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.festival-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--amber);
  line-height: 1;
}

.festival-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.clock {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--white);
  letter-spacing: 2px;
  line-height: 1;
}

/* ZONE TABS */
.zone-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.zone-scroll::-webkit-scrollbar { display: none; }

.zone-pill {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}
.zone-pill:active { transform: scale(0.95); }
.zone-pill.active {
  background: var(--amber);
  border-color: var(--amber);
  color: #000;
}

/* VIEW TOGGLES */
.view-toggles {
  display: flex;
  gap: 6px;
  padding: 8px 16px 10px;
  background: var(--bg);
  position: sticky;
  top: 148px;
  z-index: 99;
  border-bottom: 1px solid var(--border);
}

.view-btn {
  flex: 1;
  padding: 7px 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}
.view-btn:active { transform: scale(0.97); }
.view-btn.active {
  background: var(--amber-dim);
  border-color: var(--amber-border);
  color: var(--amber);
}

/* PROGRESS BAR */
.progress-bar-wrap {
  padding: 10px 16px 0;
  background: var(--bg);
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
}
.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 10px;
}
.progress-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* EVENT LIST */
#event-list {
  padding: 12px 12px 80px;
}

.time-group {
  margin-bottom: 4px;
}

.time-group-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 14px 4px 6px;
  text-transform: uppercase;
}

/* EVENT CARD */
.event-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 12px 12px 14px;
  margin-bottom: 6px;

  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
  overflow: hidden;
}
.event-card:active { background: var(--card-hover); }

.event-card.timed {
  border-left: 3px solid var(--amber);
}
.event-card.dropin {
  border-left: 3px solid rgba(255,255,255,0.1);
}
.event-card.cancelled {
  border-left: 3px solid var(--cancelled-color);
  opacity: 0.5;
}
.event-card.done {
  opacity: var(--done-opacity);
}
.event-card.done .event-name {
  text-decoration: line-through;
}

.event-body {
  flex: 1;
  min-width: 0;
}

.event-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}

.event-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.5px;
  color: var(--amber);

.event-badge {

  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.3px;
  text-transform: uppercase;

.badge-timed {
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid var(--amber-border);
}
.badge-dropin {
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  border: 1px solid var(--border);
}
.badge-cancelled {
  background: rgba(255,77,77,0.15);
  color: var(--cancelled-color);
  border: 1px solid rgba(255,77,77,0.3);
}
.badge-zone {
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  border: 1px solid var(--border);
}

.event-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 3px;
}

.event-venue {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

.event-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* CHECKBOX */
.event-check {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.15s;
}
.event-card.done .event-check {
  background: var(--green);
  border-color: var(--green);
}
.check-icon {
  display: none;
  width: 14px;
  height: 14px;
}
.event-card.done .check-icon { display: block; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* NO SCROLL on zone when needed */
@media (max-width: 900px) {
  .festival-title { font-size: 20px; }
}
</style>

// ── STATE ──────────────────────────────────────────────────
let activeZone = 'All';
let activeView = 'all';
let checked = JSON.parse(localStorage.getItem('gerf_sat_checked') || '{}');

function saveChecked() {
  localStorage.setItem('gerf_sat_checked', JSON.stringify(checked));
}

// ── CLOCK ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 10000);

// ── TIME HELPERS ──────────────────────────────────────────
function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function nowMinutes() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function isUpNext(ev) {
  const start = timeToMinutes(ev.time);
  const end = timeToMinutes(ev.end);
  const now = nowMinutes();
  return (start <= now + 90 && end > now);
}

// ── ZONE TABS ─────────────────────────────────────────────
function renderZoneTabs() {
  const container = document.getElementById('zone-tabs');
  container.innerHTML = '';
  ZONES.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'zone-pill' + (z === activeZone ? ' active' : '');
    btn.textContent = z;
    btn.addEventListener('click', () => {
      activeZone = z;
      renderZoneTabs();
      renderEvents();
    });
    container.appendChild(btn);
  });
}

// ── VIEW TOGGLES ──────────────────────────────────────────
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeView = btn.dataset.view;
    renderEvents();
  });
});

// ── FILTER ────────────────────────────────────────────────
function filterEvents() {
  return EVENTS.filter(ev => {
    if (activeZone !== 'All' && ev.zone !== activeZone) return false;
    if (activeView === 'upnext' && !isUpNext(ev)) return false;
    if (activeView === 'mylist' && checked[ev.id]) return false;
    return true;
  });
}

// ── PROGRESS ─────────────────────────────────────────────
function updateProgress() {
  const total = EVENTS.filter(e => !e.cancelled).length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-text').textContent = done + ' done of ' + total;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── RENDER EVENTS ─────────────────────────────────────────
function renderEvents() {
  const list = document.getElementById('event-list');
  const filtered = filterEvents();

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="big">🎪</div><p>No events match your filters.</p></div>';
    return;
  }

  // Group by time
  const groups = {};
  filtered.forEach(ev => {
    const key = ev.timed ? ev.time : 'dropin';
    if (!groups[key]) groups[key] = [];
    groups[key].push(ev);
  });

  // Sort keys: timed events first by time, then drop-ins
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === 'dropin') return 1;
    if (b === 'dropin') return -1;
    return timeToMinutes(a) - timeToMinutes(b);
  });

  list.innerHTML = '';
  sortedKeys.forEach(key => {
    const group = document.createElement('div');
    group.className = 'time-group';

    const label = document.createElement('div');
    label.className = 'time-group-label';
    label.textContent = key === 'dropin' ? 'Drop in anytime · 12:00 – 18:00' : key;
    group.appendChild(label);

    groups[key].forEach(ev => {
      group.appendChild(buildCard(ev));
    });

    list.appendChild(group);
  });
}

function buildCard(ev) {
  const card = document.createElement('div');
  const isDone = !!checked[ev.id];
  const classes = ['event-card'];
  if (ev.timed) classes.push('timed');
  else classes.push('dropin');
  if (ev.cancelled) classes.push('cancelled');
  if (isDone) classes.push('done');
  card.className = classes.join(' ');
  card.dataset.id = ev.id;

  if (!ev.cancelled) {
    card.addEventListener('click', () => toggleCheck(ev.id));
  }

  const zoneLabel = ev.zone !== 'General' ? `<span class="event-badge badge-zone">${ev.zone}</span>` : '';
  const badge = ev.cancelled
    ? '<span class="event-badge badge-cancelled">Cancelled</span>'
    : ev.timed
      ? '<span class="event-badge badge-timed">⏱ Timed</span>'
      : '<span class="event-badge badge-dropin">Drop in</span>';

  card.innerHTML = `
    <div class="event-body">
      <div class="event-meta">
        <span class="event-time">${ev.time}${ev.timed ? '–' + ev.end : ''}</span>
        ${badge}
        ${zoneLabel}
      </div>
      <div class="event-name">${ev.name}</div>
      <div class="event-venue">📍 ${ev.venue}</div>
      <div class="event-desc">${ev.desc}</div>
    </div>
    <div class="event-check">
      <svg class="check-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 7L5.5 10.5L12 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;

  return card;
}

function toggleCheck(id) {
  checked[id] = !checked[id];
  if (!checked[id]) delete checked[id];
  saveChecked();
  updateProgress();
  renderEvents();
}

// ── INIT ──────────────────────────────────────────────────
renderZoneTabs();
renderEvents();
updateProgress();
</script>
